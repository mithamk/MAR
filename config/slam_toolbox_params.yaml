slam_toolbox:
  ros__parameters:

    # ----- Solver (optimization engine) -----
    solver_plugin: solver_plugins::CeresSolver   # Use Ceres to minimize mapping errors
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY  # Efficient solver for large sparse problems
    ceres_preconditioner: SCHUR_JACOBI           # Speeds up solving process
    ceres_trust_strategy: LEVENBERG_MARQUARDT    # Balances speed vs accuracy
    ceres_dogleg_type: TRADITIONAL_DOGLEG        # Alternative optimization strategy
    ceres_loss_function: None                    # No special error filtering

    # ----- Frames (TF tree) -----
    odom_frame: odom             # Local frame (drifts over time)
    map_frame: map               # Global corrected frame
    base_frame: base_footprint   # Robot base (center, no tilt)

    # ----- Sensor input -----
    scan_topic: /scan            # LiDAR data topic
    use_map_saver: true          # Enable saving map (.pgm + .yaml)
    mode: mapping                # Build map (not just localization)

    # ----- Lifecycle -----
    lifecycle_startup: true      # Auto-start SLAM node (no manual activation)

    # ----- General params -----
    debug_logging: false         # Disable verbose logs
    throttle_scans: 1            # Use every scan (no skipping)
    transform_publish_period: 0.02  # Publish TF at 50 Hz
    map_update_interval: 5.0     # Update map every 5 sec
    resolution: 0.05             # Map resolution = 5 cm
    max_laser_range: 12.0        # Ignore scans beyond 12 m
    minimum_time_interval: 0.5   # Minimum time between updates
    transform_timeout: 0.2       # Wait max 0.2 sec for TF
    tf_buffer_duration: 30.0     # Store TF history for 30 sec
    stack_size_to_use: 40000000 # Memory for SLAM computation

    # ----- Loop closure -----
    enable_interactive_mode: true  # Allow manual correction in RViz

    # ----- Scan matching (local tracking) -----
    use_scan_matching: true        # Enable scan matching
    use_scan_barycenter: true      # Use scan center for stability
    minimum_travel_distance: 0.3   # Update after 30 cm movement
    minimum_travel_heading: 0.5    # Update after ~28° rotation
    scan_buffer_size: 10           # Store last 10 scans
    scan_buffer_maximum_scan_distance: 10.0  # Limit scan distance
    link_match_minimum_response_fine: 0.1    # Minimum match quality
    link_scan_maximum_distance: 1.5          # Match nearby scans only

    # ----- Loop closure (global correction) -----
    loop_search_maximum_distance: 3.0   # Search loops within 3 m
    do_loop_closing: true               # Enable loop closure
    loop_match_minimum_chain_size: 10   # Need 10 scans minimum
    loop_match_maximum_variance_coarse: 3.0  # Allow some error
    loop_match_minimum_response_coarse: 0.35 # Rough match threshold
    loop_match_minimum_response_fine: 0.45   # Strict match threshold

    # ----- Fine correlation (small precise search) -----
    correlation_search_space_dimension: 0.5   # Search within 0.5 m
    correlation_search_space_resolution: 0.01 # 1 cm precision
    correlation_search_space_smear_deviation: 0.1  # Allow small noise

    # ----- Loop correlation (large search) -----
    loop_search_space_dimension: 8.0    # Search large area (8 m)
    loop_search_space_resolution: 0.05  # 5 cm precision
    loop_search_space_smear_deviation: 0.03 # Small smoothing

    # ----- Scan matcher tuning -----
    distance_variance_penalty: 0.5      # Penalize distance error
    angle_variance_penalty: 1.0         # Penalize rotation error
    fine_search_angle_offset: 0.00349   # Small angle (~0.2°)
    coarse_search_angle_offset: 0.349   # Large angle (~20°)
    coarse_angle_resolution: 0.0349     # Step size (~2°)
    minimum_angle_penalty: 0.9          # Minimum rotation penalty
    minimum_distance_penalty: 0.5       # Minimum distance penalty
    use_response_expansion: true        # Improve matching robustness
